<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - News & Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 110px;
        }

        /* Estilización de tarjetas de equipos */
        .team-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .team-card:active { transform: scale(0.95); }

        /* Carrusel de noticias ocultando scrollbar */
        .news-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 16px;
            padding: 4px;
            scrollbar-width: none;
        }
        .news-container::-webkit-scrollbar { display: none; }
        .news-card {
            flex: 0 0 85%;
            scroll-snap-align: center;
        }

        /* Navegación Glassmorphism */
        .nav-bottom {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            height: 70px;
            border-radius: 24px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 50;
        }

        .cam-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            width: 58px; height: 58px; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            transform: translateY(-28px);
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.35);
        }

        /* Modal */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%;
            border-radius: 32px 32px 0 0;
            padding: 30px; 
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal.active { display: flex; }
        .modal.active .modal-content { transform: translateY(0); }
    </style>
</head>
<body>

    <header class="p-6 pb-2 flex justify-between items-center">
        <div>
            <p class="text-[10px] font-extrabold text-emerald-600 uppercase tracking-[0.2em]">Live Coverage</p>
            <h1 class="text-3xl font-extrabold text-slate-900">Mundial 2026</h1>
        </div>
        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100">
            <i class="fa-solid fa-bell text-slate-400"></i>
        </div>
    </header>

    <section class="px-6 mb-8">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold text-slate-800">Noticias</h2>
            <span class="text-xs font-bold text-emerald-600">Ver todas</span>
        </div>
        
        <div class="news-container">
            <div class="news-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-slate-100">
                <div class="h-40 bg-slate-200 relative">
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover">
                    <span class="absolute top-4 left-4 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase">Urgente</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-slate-800 leading-tight mb-2">Sedes confirmadas: El Estadio Azteca inaugurará el mundial.</h3>
                    <p class="text-[11px] text-slate-400 flex items-center gap-2">
                        <i class="fa-regular fa-clock"></i> Hace 2 horas • FIFA News
                    </p>
                </div>
            </div>

            <div class="news-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-slate-100">
                <div class="h-40 bg-slate-200 relative">
                    <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover">
                    <span class="absolute top-4 left-4 bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase">Análisis</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-slate-800 leading-tight mb-2">¿Será el último baile? Messi confirma su presencia en 2026.</h3>
                    <p class="text-[11px] text-slate-400 flex items-center gap-2">
                        <i class="fa-regular fa-clock"></i> Hace 5 horas • Diario Sport
                    </p>
                </div>
            </div>
        </div>
    </section>

    <section class="px-6">
        <h2 class="text-xl font-bold text-slate-800 mb-4">Selecciones</h2>
        <main id="teamsGrid" class="grid grid-cols-2 gap-4">
            </main>
    </section>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <div id="modalBody"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-slate-900 text-white rounded-2xl font-bold active:scale-95 transition-all">
                Cerrar
            </button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="text-emerald-600 flex flex-col items-center gap-1">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Inicio</span>
        </button>
        
        <a href="arcamera.html" class="cam-btn">
            <i class="fa-solid fa-expand"></i>
        </a>

        <button class="text-slate-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-futbol text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Partidos</span>
        </button>
    </nav>

    <script>
        const teams = [
            { name: "México", code: "mx", desc: "El anfitrión por excelencia. México busca romper la barrera del quinto partido en un Estadio Azteca que rugirá con más fuerza que nunca.", rank: "15" },
            { name: "Argentina", code: "ar", desc: "La Albiceleste llega como campeona del mundo. Con una mezcla de veteranía y juventud, buscan defender su corona.", rank: "1" },
            { name: "EE.UU.", code: "us", desc: "La generación dorada de EE.UU. tiene su gran cita jugando en casa para consolidarse como potencia.", rank: "11" },
            { name: "Colombia", code: "co", desc: "La fiebre amarilla está de vuelta con un fútbol alegre y una defensa sólida liderada por nuevas figuras.", rank: "12" },
            { name: "Canadá", code: "ca", desc: "La hoja de maple quiere demostrar que su crecimiento en CONCACAF no fue casualidad.", rank: "45" },
            { name: "Ecuador", code: "ec", desc: "Juventud y potencia física. 'La Tri' es un bloque defensivo casi impenetrable.", rank: "31" },
            { name: "Brasil", code: "br", desc: "El pentacampeón siempre es favorito. El Jogo Bonito busca la sexta estrella.", rank: "5" },
            { name: "Uruguay", code: "uy", desc: "La garra charrúa renovada con un sistema ofensivo dinámico y mucha entrega.", rank: "14" }
        ];

        const grid = document.getElementById('teamsGrid');

        teams.forEach(team => {
            const card = document.createElement('div');
            card.className = `team-card bg-white p-4 rounded-[24px] shadow-sm flex flex-col items-center border border-slate-50`;
            card.onclick = () => showInfo(team);
            card.innerHTML = `
                <img src="https://flagcdn.com/w160/${team.code}.png" class="w-16 h-12 object-cover rounded-lg shadow-sm mb-3" alt="${team.name}">
                <span class="font-bold text-slate-700 text-sm">${team.name}</span>
            `;
            grid.appendChild(card);
        });

        function showInfo(team) {
            const modal = document.getElementById('infoModal');
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="flex items-center gap-4 mb-6 text-left">
                    <img src="https://flagcdn.com/w160/${team.code}.png" class="w-16 h-10 object-cover rounded-lg shadow-md">
                    <div>
                        <h2 class="text-2xl font-extrabold text-slate-900">${team.name}</h2>
                        <span class="text-emerald-500 font-bold text-xs uppercase tracking-widest">Team Profile</span>
                    </div>
                </div>
                <p class="text-slate-600 leading-relaxed mb-6 text-sm">${team.desc}</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Ranking</p>
                        <p class="text-slate-900 font-extrabold text-lg">#${team.rank}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Estado</p>
                        <p class="text-emerald-600 font-extrabold text-lg">Listo</p>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.remove('active');
        }
    </script>
</body>
</html>

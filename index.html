<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sedes Mundial 2026 - 8 Equipos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8fafc;
        font-family: "Plus Jakarta Sans", sans-serif;
        padding-bottom: 110px;
      }

      .team-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }
      .team-card:active {
        transform: scale(0.95);
      }

      .news-container {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 16px;
        padding: 4px;
        scrollbar-width: none;
      }
      .news-container::-webkit-scrollbar {
        display: none;
      }
      .news-card {
        flex: 0 0 85%;
        scroll-snap-align: center;
      }

      .nav-bottom {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        height: 70px;
        border-radius: 24px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.5);
        z-index: 50;
      }

      .cam-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        width: 58px;
        height: 58px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        transform: translateY(-28px);
        box-shadow: 0 12px 24px rgba(16, 185, 129, 0.35);
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        z-index: 100;
        align-items: flex-end;
      }
      .modal-content {
        background: white;
        width: 100%;
        max-height: 92vh;
        overflow-y: auto;
        border-radius: 32px 32px 0 0;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .modal.active {
        display: flex;
      }
      .modal.active .modal-content {
        transform: translateY(0);
      }

      .video-wrapper {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        background: #000;
      }
      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header class="p-6 pb-2 flex justify-between items-center text-slate-900">
      <div>
        <p
          class="text-[10px] font-extrabold text-emerald-600 uppercase tracking-[0.2em]"
        >
          Guía de Sedes
        </p>
        <h1 class="text-3xl font-extrabold tracking-tight">Copa 2026</h1>
      </div>
      <div
        class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100 text-slate-400"
      >
        <i class="fa-solid fa-location-crosshairs"></i>
      </div>
    </header>

    <section class="px-6 mb-8">
      <div class="flex justify-between items-end mb-4">
        <h2 class="text-xl font-bold text-slate-800">Actualidad</h2>
        <span class="text-xs font-bold text-emerald-600">Ver todo</span>
      </div>

      <div class="news-container">
        <div
          class="news-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-slate-100"
        >
          <div class="h-40 relative">
            <img
              src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=500&q=80"
              class="w-full h-full object-cover"
            />
            <span
              class="absolute top-4 left-4 bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase italic shadow-lg"
              >En vivo</span
            >
          </div>
          <div class="p-4">
            <h3 class="font-bold text-slate-800 leading-tight mb-1 text-sm">
              Tour virtual: Así luce el SoFi Stadium hoy.
            </h3>
            <p class="text-[10px] text-slate-400">
              Infraestructura • 5 min lectura
            </p>
          </div>
        </div>
      </div>
    </section>

    <section class="px-6">
      <h2 class="text-xl font-bold text-slate-800 mb-4">Selecciones</h2>
      <main id="teamsGrid" class="grid grid-cols-2 gap-4"></main>
    </section>

    <div id="infoModal" class="modal" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalBody"></div>
        <div class="p-6 pt-0 space-y-3">
          <a
            id="mapBtn"
            target="_blank"
            class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all"
          >
            <i class="fa-solid fa-map-pin"></i> Ver en Google Maps
          </a>
          <button
            onclick="closeModal()"
            class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold"
          >
            Regresar
          </button>
        </div>
      </div>
    </div>

    <nav class="nav-bottom">
      <button class="text-emerald-600 flex flex-col items-center gap-1">
        <i class="fa-solid fa-house-chimney text-xl"></i>
        <span class="text-[10px] font-bold">Inicio</span>
      </button>
      <a href="arcamera.html" class="cam-btn"
        ><i class="fa-solid fa-expand"></i
      ></a>
      <button
        class="text-slate-400 flex flex-col items-center gap-1"
        onclick="window.location.href = 'estadisticas.html'"
      >
        <i class="fa-solid fa-chart-line text-xl"></i>
        <span class="text-[10px] font-bold">Stats</span>
      </button>
    </nav>

    <script>
      const teams = [
        {
          name: "México",
          code: "mx",
          stadium: "Estadio Azteca",
          videoId: "G0H9wOAtOTo",
          desc: "El anfitrión por excelencia. México busca romper la barrera del quinto partido en un Estadio Azteca que rugirá con más fuerza que nunca.",
          rank: "15",
          city: "CDMX",
          map: "https://maps.app.goo.gl/T4fGv6WvK8L9rJ8v8",
        },
        {
          name: "Argentina",
          code: "ar",
          stadium: "MetLife Stadium",
          videoId: "6KzYmQhC9Hk",
          desc: "La Albiceleste llega como campeona del mundo. Con una mezcla de veteranía y juventud, buscan defender su corona.",
          rank: "1",
          city: "New Jersey",
          map: "https://maps.app.goo.gl/p57U2-M1u_0",
        },
        {
          name: "EE.UU.",
          code: "us",
          stadium: "SoFi Stadium",
          videoId: "p57U2-M1u_0",
          desc: "La generación dorada de EE.UU. tiene su gran cita jugando en casa para consolidarse como potencia.",
          rank: "11",
          city: "Los Angeles",
          map: "https://maps.app.goo.gl/3XyH-9H4A",
        },
        {
          name: "Colombia",
          code: "co",
          stadium: "Hard Rock Stadium",
          videoId: "9o4SUnMsh9I",
          desc: "La fiebre amarilla está de vuelta con un fútbol alegre y una defensa sólida liderada por nuevas figuras.",
          rank: "12",
          city: "Miami",
          map: "https://maps.app.goo.gl/9o4SUnMsh9I",
        },
        {
          name: "Canadá",
          code: "ca",
          stadium: "BMO Field",
          videoId: "yN7m-T-YvU0",
          desc: "La hoja de maple quiere demostrar que su crecimiento en CONCACAF no fue casualidad.",
          rank: "45",
          city: "Toronto",
          map: "https://maps.app.goo.gl/yN7m-T-YvU0",
        },
        {
          name: "Ecuador",
          code: "ec",
          stadium: "Lumen Field",
          videoId: "pXhX_pP3m4k",
          desc: "Juventud y potencia física. 'La Tri' es un bloque defensivo casi impenetrable.",
          rank: "31",
          city: "Seattle",
          map: "https://maps.app.goo.gl/pXhX_pP3m4k",
        },
        {
          name: "Brasil",
          code: "br",
          stadium: "AT&T Stadium",
          videoId: "p_6XyH-9H4A",
          desc: "El pentacampeón siempre es favorito. El Jogo Bonito busca la sexta estrella.",
          rank: "5",
          city: "Dallas",
          map: "https://maps.app.goo.gl/p_6XyH-9H4A",
        },
        {
          name: "Uruguay",
          code: "uy",
          stadium: "Levi's Stadium",
          videoId: "I_uXW5Yn8P0",
          desc: "La garra charrúa renovada con un sistema ofensivo dinámico y mucha entrega.",
          rank: "14",
          city: "San Francisco",
          map: "https://maps.app.goo.gl/I_uXW5Yn8P0",
        },
      ];

      const grid = document.getElementById("teamsGrid");

      teams.forEach((team) => {
        const card = document.createElement("div");
        card.className = `team-card bg-white p-4 rounded-[24px] shadow-sm flex flex-col items-center border border-slate-50 relative overflow-hidden`;
        card.onclick = () => showInfo(team);
        card.innerHTML = `
                <div class="absolute top-2 right-2 text-emerald-500 opacity-50"><i class="fa-solid fa-play text-[10px]"></i></div>
                <img src="https://flagcdn.com/w160/${team.code}.png" class="w-14 h-10 object-cover rounded shadow-sm mb-3">
                <span class="font-bold text-slate-700 text-sm">${team.name}</span>
                <span class="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-tighter">${team.city}</span>
            `;
        grid.appendChild(card);
      });

      function showInfo(team) {
        const modal = document.getElementById("infoModal");
        const body = document.getElementById("modalBody");
        const mapBtn = document.getElementById("mapBtn");

        mapBtn.href = team.map;
        body.innerHTML = `
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${team.videoId}?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-extrabold text-emerald-600 uppercase tracking-widest">${team.stadium}</span>
                            <h2 class="text-2xl font-extrabold text-slate-900 leading-tight">${team.name}</h2>
                        </div>
                        <div class="bg-slate-50 px-3 py-1 rounded-lg border border-slate-100 font-bold text-slate-700 text-xs">#${team.rank} Rank</div>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6">${team.desc}</p>
                </div>
            `;
        modal.classList.add("active");
      }

      function closeModal() {
        const modal = document.getElementById("infoModal");
        modal.classList.remove("active");
        setTimeout(() => {
          document.getElementById("modalBody").innerHTML = "";
        }, 400);
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>MundialScan AR.js</title>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1c2407b26c61958baa93967b5412487cd94b290b/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }
      #info-card {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 92%;
        max-width: 400px;
        background: white;
        border-radius: 24px;
        padding: 20px;
        z-index: 1000;
        display: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
      .option-btn {
        width: 100%;
        text-align: left;
        padding: 12px;
        margin-top: 8px;
        border: 2px solid #f1f5f9;
        border-radius: 12px;
        transition: 0.2s;
      }
      .correct {
        background: #dcfce7 !important;
        border-color: #22c55e !important;
      }
      .incorrect {
        background: #fee2e2 !important;
        border-color: #ef4444 !important;
      }
      #scan-guide {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 50;
      }
      .guide-box {
        width: 250px;
        height: 250px;
        border: 2px dashed rgba(255, 255, 255, 0.5);
        border-radius: 20px;
      }
    </style>
  </head>

  <body>
    <div id="scan-guide">
      <div class="guide-box"></div>
      <p
        class="absolute bottom-1/4 text-white font-medium bg-black/40 px-4 py-2 rounded-full"
      >
        Encuadra el marcador
      </p>
    </div>

    <div id="info-card">
      <div class="flex items-center gap-4 mb-3">
        <img
          id="team-flag"
          src=""
          class="w-14 h-10 object-cover rounded shadow-sm border"
        />
        <div>
          <h2 id="team-name" class="text-xl font-bold text-slate-800"></h2>
          <p class="text-[10px] text-slate-400 uppercase tracking-widest">
            Detección Exitosa
          </p>
        </div>
      </div>
      <p id="team-desc" class="text-sm text-slate-600 mb-4"></p>
      <div id="quiz-container" class="border-t pt-3">
        <p id="question-text" class="font-bold text-slate-800 mb-2 text-sm"></p>
        <div id="options-list"></div>
        <p
          id="quiz-feedback"
          class="text-center mt-3 font-bold text-xs hidden"
        ></p>
      </div>
      <button
        onclick="location.reload()"
        class="w-full mt-4 text-[10px] text-slate-400 underline uppercase"
      >
        Escanear otro
      </button>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
    >
      <a-marker
        type="pattern"
        url="./markers/pattern-br.patt"
        data-idx="0"
        data-name="pattern-br"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-ec.patt"
        data-idx="1"
        data-name="pattern-ec"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-can.patt"
        data-idx="2"
        data-name="pattern-can"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-col.patt"
        data-idx="3"
        data-name="pattern-col"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-ar.patt"
        data-idx="4"
        data-name="pattern-ar"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-eu.patt"
        data-idx="5"
        data-name="pattern-eu"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-ur.patt"
        data-idx="6"
        data-name="pattern-ur"
      ></a-marker>
      <a-marker
        type="pattern"
        url="./markers/pattern-mx.patt"
        data-idx="7"
        data-name="pattern-mx"
      ></a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script type="module">
      import { teamData } from "./data/teams.js";

      const infoCard = document.getElementById("info-card");
      const scanGuide = document.getElementById("scan-guide");
      let activeIndex = null;

      // Verificar carga de datos
      console.log("Datos cargados de teams.js:", teamData);

      document.querySelectorAll("a-marker").forEach((marker) => {
        // EVENTO DE ESCANEO REAL
        marker.addEventListener("markerFound", () => {
          const id = parseInt(marker.getAttribute("data-idx"));
          const imgName = marker.getAttribute("data-name");

          console.log("¡SISTEMA: Marcador detectado visualmente! ID:", id);

          if (activeIndex === id) return;
          activeIndex = id;

          const team = teamData[id];
          if (team) {
            actualizarUI(team, imgName);
            infoCard.style.display = "block";
            scanGuide.style.display = "none";
          }
        });

        marker.addEventListener("markerLost", () => {
          console.log("SISTEMA: Marcador fuera de vista");
        });
      });

      function actualizarUI(team, imgName) {
        document.getElementById("team-name").innerText = team.name;
        document.getElementById("team-desc").innerText = team.desc;

        // Carga la imagen local desde tu carpeta flags/
        const flagImg = document.getElementById("team-flag");
        flagImg.src = `flags/${imgName}.png`;

        // Manejo de error si la imagen no existe
        flagImg.onerror = () => {
          console.error(`No se encontró la imagen: flags/${imgName}.png`);
          flagImg.src = "https://via.placeholder.com/80x50?text=Error";
        };

        const quiz = team.quiz[0];
        if (quiz) {
          document.getElementById("question-text").innerText = quiz.q;
          const list = document.getElementById("options-list");
          list.innerHTML = "";
          const feedback = document.getElementById("quiz-feedback");
          feedback.classList.add("hidden");

          quiz.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => {
              const buttons = list.querySelectorAll(".option-btn");
              buttons.forEach((b) => (b.disabled = true));

              if (i === quiz.c) {
                btn.classList.add("correct");
                feedback.innerText = "✅ ¡Correcto!";
              } else {
                btn.classList.add("incorrect");
                buttons[quiz.c].classList.add("correct");
                feedback.innerText = "❌ Incorrecto";
              }
              feedback.classList.remove("hidden");
            };
            list.appendChild(btn);
          });
        }
      }
    </script>
  </body>
</html>

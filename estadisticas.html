<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estadísticas Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8fafc;
        font-family: "Plus Jakarta Sans", sans-serif;
        padding-bottom: 110px;
      }

      .stat-card {
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 1);
      }

      /* Animación de las barras de estadísticas */
      .progress-bar {
        height: 8px;
        border-radius: 4px;
        background: #e2e8f0;
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 1s ease-in-out;
      }

      .nav-bottom {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        height: 70px;
        border-radius: 24px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.5);
        z-index: 50;
      }

      .cam-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        width: 58px;
        height: 58px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        transform: translateY(-28px);
        box-shadow: 0 12px 24px rgba(16, 185, 129, 0.35);
      }
    </style>
  </head>
  <body>
    <header class="p-6 pb-2">
      <div class="flex justify-between items-center mb-2">
        <span
          class="bg-emerald-100 text-emerald-700 text-[10px] font-extrabold uppercase tracking-widest px-3 py-1 rounded-full"
          >Data Analytics</span
        >
        <i class="fa-solid fa-chart-pie text-slate-400 text-xl"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
        Estadísticas
      </h1>
      <p class="text-slate-500 text-sm">
        Rendimiento proyectado para el Mundial.
      </p>
    </header>

    <main class="px-6 space-y-6">
      <div
        class="bg-slate-900 rounded-[32px] p-6 text-white shadow-xl relative overflow-hidden"
      >
        <div class="relative z-10">
          <p
            class="text-emerald-400 font-bold text-[10px] uppercase tracking-widest mb-1"
          >
            Top Rendimiento
          </p>
          <h2 class="text-2xl font-bold mb-4">Argentina</h2>
          <div class="flex items-end gap-2">
            <span class="text-5xl font-extrabold">98%</span>
            <span class="text-emerald-400 text-sm font-bold mb-2"
              ><i class="fa-solid fa-caret-up"></i> Prob. Victoria</span
            >
          </div>
        </div>
        <i
          class="fa-solid fa-trophy absolute -right-4 -bottom-4 text-white/10 text-9xl rotate-12"
        ></i>
      </div>

      <div id="statsContainer" class="space-y-4"></div>
    </main>

    <nav class="nav-bottom">
      <button class="text-emerald-600 flex flex-col items-center gap-1" onclick="window.location.href = 'index.html'">
        <i class="fa-solid fa-house-chimney text-xl"></i>
        <span class="text-[10px] font-bold">Inicio</span>
      </button>
      <a href="arcamera.html" class="cam-btn"
        ><i class="fa-solid fa-expand"></i
      ></a>
      <button
        class="text-slate-400 flex flex-col items-center gap-1"
      >
        <i class="fa-solid fa-chart-line text-xl"></i>
        <span class="text-[10px] font-bold">Stats</span>
      </button>
    </nav>

    <script>
      const stats = [
        { name: "Argentina", power: 98, winRate: 92, color: "bg-sky-400" },
        { name: "Brasil", power: 94, winRate: 88, color: "bg-yellow-400" },
        { name: "EE.UU.", power: 85, winRate: 75, color: "bg-blue-600" },
        { name: "Colombia", power: 88, winRate: 80, color: "bg-orange-400" },
        { name: "Uruguay", power: 86, winRate: 78, color: "bg-cyan-600" },
        { name: "México", power: 82, winRate: 70, color: "bg-emerald-600" },
        { name: "Ecuador", power: 79, winRate: 65, color: "bg-yellow-500" },
        { name: "Canadá", power: 75, winRate: 60, color: "bg-red-500" },
      ];

      const container = document.getElementById("statsContainer");

      stats.forEach((team) => {
        const card = document.createElement("div");
        card.className =
          "stat-card bg-white p-5 rounded-[24px] shadow-sm border border-slate-100";
        card.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="font-extrabold text-slate-800">${team.name}</span>
                    <span class="text-xs font-bold text-slate-400 uppercase">Power Index: ${team.power}</span>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-1">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Probabilidad de Clasificación</span>
                            <span class="text-[10px] font-bold text-slate-800">${team.winRate}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${team.color}" style="width: ${team.winRate}%"></div>
                        </div>
                    </div>
                </div>
            `;
        container.appendChild(card);
      });
    </script>
  </body>
</html>
